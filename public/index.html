<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화물진행정보 모니터링</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

    header { background: #003087; color: #fff; padding: 12px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .header-left .logo { font-size: 18px; font-weight: 700; }
    .header-left .sub { font-size: 11px; opacity: 0.65; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .rolling-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); border-radius: 20px; padding: 5px 14px; font-size: 12px; }
    .rolling-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .agency-badge { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 14px; font-size: 12px; }
    .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 6px; padding: 4px 12px; font-size: 11px; cursor: pointer; font-family: inherit; }
    .logout-btn:hover { background: rgba(255,255,255,0.1); }

    /* 로그인 */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 60px); }
    .login-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 48px 40px; width: 360px; text-align: center; }
    .login-card h2 { font-size: 20px; margin-bottom: 8px; color: #003087; }
    .login-card p { font-size: 13px; color: #666; margin-bottom: 28px; }
    .login-card input { width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 12px; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .login-card input:focus { border-color: #003087; }
    .login-card button { width: 100%; padding: 13px; background: #003087; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .login-card button:hover { background: #0048c8; }
    .login-error { margin-top: 10px; color: #d32f2f; font-size: 13px; min-height: 18px; }

    /* 메인 */
    #main-screen { display: none; padding: 20px 28px; max-width: 1400px; margin: 0 auto; }

    /* 통계 */
    .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat { background: #fff; border-radius: 10px; padding: 14px 16px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .stat .val { font-size: 28px; font-weight: 700; }
    .stat .lbl { font-size: 11px; color: #888; margin-top: 3px; }
    .s-blue .val { color: #003087; }
    .s-red .val { color: #c62828; }
    .s-coral .val { color: #993C1D; }
    .s-amber .val { color: #854F0B; }
    .s-green .val { color: #2e7d32; }
    .s-orange .val { color: #e65100; }

    /* 카드 */
    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); padding: 16px 20px; margin-bottom: 16px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card-title { font-size: 14px; font-weight: 700; color: #003087; }

    /* 등록 폼 */
    .add-form { display: flex; gap: 8px; align-items: center; }
    .add-form input { padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .add-form input:focus { border-color: #003087; }
    .add-form input.hbl-input { width: 180px; }
    .add-form input.year-input { width: 70px; }
    .btn-add { padding: 9px 18px; background: #003087; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .btn-add:hover { background: #0048c8; }
    .btn-roll { padding: 9px 16px; background: #fff; color: #003087; border: 1.5px solid #003087; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; margin-left: auto; }
    .btn-roll:hover { background: #f0f4ff; }
    .btn-roll:disabled { opacity: 0.5; cursor: not-allowed; }
    .next-roll { font-size: 12px; color: #888; }

    /* 테이블 */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #003087; color: #fff; padding: 9px 10px; text-align: center; font-weight: 700; border: 1px solid rgba(255,255,255,0.15); white-space: nowrap; }
    thead th.sub-th { background: #1a4fa0; font-weight: 400; font-size: 11px; color: rgba(255,255,255,0.85); }
    tbody td { padding: 9px 10px; border-bottom: 1px solid #f0f0f0; text-align: center; vertical-align: middle; }
    tbody tr.tr-normal { background: #f7f7f7; }
    tbody tr.tr-normal:hover { background: #ececec; }
    tbody tr.tr-changed { background: #9e9e9e; }
    tbody tr.tr-changed td { color: #111; font-weight: 600; }
    tbody tr.tr-changed:hover { background: #8e8e8e; }
    tbody tr.tr-scanning { background: #dce8f8; }
    tbody tr.tr-error { background: #fdecea; }
    tbody tr:last-child td { border-bottom: none; }

    .bl-mono { font-family: 'Consolas', monospace; font-weight: 700; font-size: 12px; text-align: left !important; }

    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .b-red    { background: #fdecea; color: #c62828; }
    .b-amber  { background: #fff3e0; color: #e65100; }
    .b-green  { background: #e8f5e9; color: #2e7d32; }
    .b-blue   { background: #e3f2fd; color: #1565c0; }
    .b-gray   { background: #f5f5f5; color: #757575; }
    .b-coral  { background: #fbe9e7; color: #bf360c; }

    .chg-mark { font-size: 10px; padding: 1px 5px; border-radius: 6px; background: rgba(0,0,0,0.15); color: #111; font-weight: 700; margin-left: 4px; }

    /* 진행이력 */
    .seq { display: flex; align-items: flex-start; gap: 5px; flex-wrap: wrap; }
    .seq-item { display: flex; flex-direction: column; align-items: center; }
    .seq-time { font-size: 10px; color: #555; margin-top: 2px; white-space: nowrap; }
    .seq-arrow { font-size: 11px; color: #666; line-height: 2.2; font-weight: 700; }

    /* 스피너 */
    .spin { width: 14px; height: 14px; border: 2px solid #b3d4f5; border-top-color: #1565c0; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 삭제버튼 */
    .btn-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
    .btn-del:hover { color: #c62828; }

    /* 조회기간 필터 */
    .date-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .date-filter label { font-size: 12px; color: #555; font-weight: 600; white-space: nowrap; }
    .date-filter input[type="date"] { padding: 6px 10px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 12px; font-family: inherit; outline: none; color: #333; }
    .date-filter input[type="date"]:focus { border-color: #003087; }
    .btn-filter { padding: 6px 16px; background: #003087; color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-filter:hover { background: #0048c8; }
    .btn-filter-reset { padding: 6px 12px; background: #fff; color: #888; border: 1.5px solid #ddd; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .btn-filter-reset:hover { border-color: #888; }
    .filter-result { font-size: 11px; color: #888; margin-left: 4px; }

    .legend { display: flex; gap: 14px; margin-bottom: 10px; font-size: 11px; color: #666; align-items: center; }
    .leg { display: flex; align-items: center; gap: 5px; }
    .leg-box { width: 14px; height: 14px; border-radius: 3px; }

    #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; align-items: center; justify-content: center; }
    #loading-overlay.show { display: flex; }
    .loading-box { background: #fff; border-radius: 12px; padding: 28px 36px; text-align: center; font-size: 14px; }
    .loading-box .spin-lg { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #003087; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }

    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🛃 화물진행정보 모니터링</div>
    <div class="sub">관세청 화물정보 API · HBL 자동 롤링 조회</div>
  </div>
  <div class="header-right">
    <div class="rolling-badge" id="rolling-badge" style="display:none">
      <div class="rolling-dot"></div>
      <span>롤링 중 · 10분 간격</span>
    </div>
    <div class="agency-badge" id="agency-badge" style="display:none"></div>
    <button class="logout-btn" id="logout-btn" style="display:none" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
  <div class="loading-box">
    <div class="spin-lg"></div>
    <div id="loading-msg">처리 중...</div>
  </div>
</div>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-card">
    <h2>대행사 로그인</h2>
    <p>발급받은 대행사 코드와 비밀번호를 입력하세요</p>
    <input type="text" id="code-input" placeholder="대행사 코드" autocomplete="off" />
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="off" />
    <button onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- 메인 -->
<div id="main-screen">

  <!-- 통계 -->
  <div class="stats">
    <div class="stat s-blue"><div class="val" id="s-total">0</div><div class="lbl">전체 HBL</div></div>
    <div class="stat s-red"><div class="val" id="s-target">0</div><div class="lbl">관리대상</div></div>
    <div class="stat s-coral"><div class="val" id="s-immediate">0</div><div class="lbl">즉시검사</div></div>
    <div class="stat s-amber"><div class="val" id="s-inprogress">0</div><div class="lbl">검사진행중</div></div>
    <div class="stat s-green"><div class="val" id="s-done">0</div><div class="lbl">검사완료/비대상</div></div>
    <div class="stat s-orange"><div class="val" id="s-changed">0</div><div class="lbl">상태변화 감지</div></div>
  </div>

  <!-- HBL 등록 + 테이블 -->
  <div class="card">
    <div class="card-head">
      <div class="card-title">전체 HBL 모니터링 현황</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="next-roll" id="next-roll-text"></span>
        <button class="btn-roll" id="btn-roll" onclick="doRollNow()">▶ 지금 조회</button>
      </div>
    </div>

    <!-- 조회기간 필터 -->
    <div class="date-filter">
      <label>조회기간</label>
      <input type="date" id="date-from" />
      <span style="font-size:12px;color:#888">~</span>
      <input type="date" id="date-to" />
      <button class="btn-filter" onclick="doScan()">조회</button>
      <button class="btn-filter-reset" onclick="resetDateFilter()">전체보기</button>
      <span class="filter-result" id="filter-result"></span>
    </div>

    <!-- 범례 -->
    <div class="legend">
      <div class="leg"><div class="leg-box" style="background:#dce8f8;border:1px solid #aac"></div> 조회중</div>
      <div class="leg"><div class="leg-box" style="background:#9e9e9e"></div> 상태변화 감지</div>
      <div class="leg"><div class="leg-box" style="background:#f7f7f7;border:1px solid #ddd"></div> 정상</div>
      <div id="last-updated" style="margin-left:auto;font-size:11px;color:#aaa"></div>
    </div>

    <div class="table-wrap">
      <table id="main-table">
        <thead>
          <tr>
            <th style="width:32px">#</th>
            <th style="width:130px;text-align:left;padding-left:12px">HBL 번호</th>
            <th style="width:110px">선명</th>
            <th style="width:60px">입항일</th>
            <th style="width:54px">양하항</th>
            <th style="width:80px">통관상태</th>
            <th style="width:64px">관리대상</th>
            <th>관리진행상황 (순차 이력 · 자동 기록)</th>
            <th style="width:58px">최종조회</th>
            <th style="width:32px"></th>
          </tr>
        </thead>
        <tbody id="main-tbody">
          <tr><td colspan="10" class="empty">등록된 HBL이 없습니다.<br>위 입력창에서 HBL 번호를 등록하세요.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  let agencyCode = '';
  let agencyName = '';
  let nextRollTimer = null;
  let allBls = [];
  const ROLL_INTERVAL = 10 * 60;

  // ── 인증 ──────────────────────────────
  document.getElementById('code-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pw-input').focus(); });
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const code = document.getElementById('code-input').value.trim();
    const password = document.getElementById('pw-input').value;
    if (!code) return;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      const res = await fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, password }) });
      const data = await res.json();
      if (data.success) {
        agencyCode = code;
        agencyName = data.name;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        document.getElementById('agency-badge').textContent = '🏢 ' + agencyName;
        document.getElementById('agency-badge').style.display = '';
        document.getElementById('rolling-badge').style.display = 'flex';
        document.getElementById('logout-btn').style.display = '';
        // 기본 조회기간: 오늘 기준 30일
        const today = new Date();
        const from = new Date(today); from.setDate(from.getDate() - 30);
        document.getElementById('date-to').value = today.toISOString().slice(0,10);
        document.getElementById('date-from').value = from.toISOString().slice(0,10);
        await loadBls();
        startCountdown();
      } else {
        errEl.textContent = data.message;
      }
    } catch { errEl.textContent = '서버 연결 오류'; }
  }

  function doLogout() {
    agencyCode = ''; agencyName = ''; allBls = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('agency-badge').style.display = 'none';
    document.getElementById('rolling-badge').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('code-input').value = '';
    document.getElementById('pw-input').value = '';
    if (nextRollTimer) clearInterval(nextRollTimer);
  }

  // ── XML 스캔 조회 ──────────────────────
  async function doScan() {
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    if (!from && !to) { alert('조회기간을 설정해주세요.'); return; }
    showLoading('수신 XML에서 HBL 검색 중...');
    try {
      const res = await fetch('/api/bls/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: agencyCode, fromDate: from, toDate: to })
      });
      const data = await res.json();
      if (data.success) {
        allBls = data.bls;
        renderTable(allBls);
        const sr = data.scanResult;
        let msg = `${allBls.length}건 표시`;
        if (sr?.error === 'folder_not_accessible' || sr?.error === 'not_configured') {
          msg += ' (XML 폴더 미연결 — 기등록 데이터)';
        } else if (sr?.registered > 0) {
          msg += ` · 신규 ${sr.registered}건 등록됨`;
        }
        document.getElementById('filter-result').textContent = msg;
      }
    } catch { alert('조회 오류가 발생했습니다.'); }
    hideLoading();
  }

  // ── 조회기간 필터 (로컬) ──────────────
  function applyDateFilter() {
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    const filtered = allBls.filter(bl => {
      const d = (bl.blDate || bl.registeredAt || '').slice(0, 10);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });
    document.getElementById('filter-result').textContent = `${filtered.length}건 표시 중 (전체 ${allBls.length}건)`;
    renderTable(filtered);
  }

  async function resetDateFilter() {
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value = '';
    document.getElementById('filter-result').textContent = '';
    await loadBls();
  }

  // ── 카운트다운 ──────────────────────
  let secondsLeft = ROLL_INTERVAL;
  function startCountdown() {
    secondsLeft = ROLL_INTERVAL;
    if (nextRollTimer) clearInterval(nextRollTimer);
    nextRollTimer = setInterval(() => {
      secondsLeft--;
      const m = Math.floor(secondsLeft / 60);
      const s = secondsLeft % 60;
      document.getElementById('next-roll-text').textContent = `다음 조회까지 ${m}분 ${String(s).padStart(2,'0')}초`;
      if (secondsLeft <= 0) {
        secondsLeft = ROLL_INTERVAL;
        loadBls();
      }
    }, 1000);
  }

  // ── HBL 목록 로드 ──────────────────
  async function loadBls() {
    try {
      const res = await fetch(`/api/bls?code=${agencyCode}`);
      const data = await res.json();
      if (data.success) {
        allBls = data.bls;
        applyDateFilter();
      }
    } catch {}
  }

  // ── HBL 삭제 ──────────────────────
  async function doDeleteBl(hblNo) {
    if (!confirm(`${hblNo} 을(를) 모니터링 목록에서 삭제하시겠습니까?`)) return;
    try {
      await fetch(`/api/bls/${hblNo}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: agencyCode })
      });
      await loadBls();
    } catch {}
  }

  // ── 지금 롤링 ──────────────────────
  async function doRollNow() {
    const btn = document.getElementById('btn-roll');
    btn.disabled = true;
    showLoading('전체 HBL 조회 중...');
    try {
      const res = await fetch('/api/roll-now', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: agencyCode })
      });
      const data = await res.json();
      if (data.success) { allBls = data.bls; applyDateFilter(); secondsLeft = ROLL_INTERVAL; }
    } catch {}
    hideLoading();
    btn.disabled = false;
  }

  // ── 테이블 렌더 ────────────────────
  function renderTable(bls) {
    const tbody = document.getElementById('main-tbody');
    if (!bls || bls.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty">조회 결과가 없습니다.<br>조회기간을 설정하고 <b>조회</b> 버튼을 눌러주세요.</td></tr>';
      updateStats([]);
      return;
    }

    tbody.innerHTML = bls.map((bl, i) => {
      const trClass = bl.scanStatus === 'error' ? 'tr-error' : bl.hasChange ? 'tr-changed' : 'tr-normal';
      const statusBadge = renderStatusBadge(bl.currentStatus);
      const prgssBadge = renderPrgsBadge(bl.prgsStts);
      const seqHtml = renderSeq(bl);
      const lastChecked = bl.lastChecked ? formatTime(bl.lastChecked) : '-';
      const chgMark = bl.hasChange ? '<span class="chg-mark">변화</span>' : '';

      return `<tr class="${trClass}">
        <td>${i + 1}</td>
        <td class="bl-mono">${bl.hblNo}${chgMark}</td>
        <td>${bl.shipNm || '-'}</td>
        <td>${formatDate(bl.etprDt)}</td>
        <td>${bl.dsprNm || '-'}</td>
        <td>${prgssBadge}</td>
        <td>${statusBadge}</td>
        <td style="text-align:left">${seqHtml}</td>
        <td style="font-size:11px;color:${bl.hasChange ? '#333' : '#aaa'}">${bl.scanStatus === 'scanning' ? '<div class="spin"></div>' : lastChecked}</td>
        <td><button class="btn-del" onclick="doDeleteBl('${bl.hblNo}')" title="삭제">×</button></td>
      </tr>`;
    }).join('');

    updateStats(bls);
    document.getElementById('last-updated').textContent = '마지막 갱신 ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function renderStatusBadge(status) {
    if (!status || status === '-') return '<span class="badge b-gray">확인중</span>';
    if (status === '검사완료') return '<span class="badge b-green">검사완료</span>';
    if (status === '비대상')  return '<span class="badge b-green">비대상</span>';
    if (status === '즉시검사') return '<span class="badge b-coral">즉시검사</span>';
    if (status.includes('진행')) return '<span class="badge b-amber">검사진행중</span>';
    return `<span class="badge b-red">${status}</span>`;
  }

  function renderPrgsBadge(prgsStts) {
    if (!prgsStts || prgsStts === '-') return '<span class="badge b-gray">-</span>';
    if (prgsStts.includes('반출완료')) return '<span class="badge b-green">반출완료</span>';
    if (prgsStts.includes('수입신고수리')) return '<span class="badge b-blue">수입신고수리</span>';
    if (prgsStts.includes('하선')) return '<span class="badge b-gray">하선신고수리</span>';
    return `<span class="badge b-gray">${prgsStts}</span>`;
  }

  function renderSeq(bl) {
    const hist = bl.progressHistory || [];
    if (hist.length === 0) {
      if (bl.currentStatus === '비대상' || !bl.currentStatus || bl.currentStatus === '-') {
        return '<span style="color:#bbb;font-size:11px">— 해당없음 —</span>';
      }
      return '<span style="color:#bbb;font-size:11px">— 이력 없음 —</span>';
    }
    return '<div class="seq">' + hist.map((h, idx) => {
      const isLast = idx === hist.length - 1;
      const badge = renderStatusBadge(h.status).replace('badge b-', 'badge b-');
      const arrow = isLast ? '' : '<span class="seq-arrow">→</span>';
      return `<div class="seq-item">${badge.replace('</span>', (isLast ? ' ◀</span>' : '</span>'))}<span class="seq-time">${formatTime(h.detectedAt)}</span></div>${arrow}`;
    }).join('') + '</div>';
  }

  function updateStats(bls) {
    document.getElementById('s-total').textContent = bls.length;
    document.getElementById('s-target').textContent = bls.filter(b => b.currentStatus && b.currentStatus !== '비대상' && b.currentStatus !== '-').length;
    document.getElementById('s-immediate').textContent = bls.filter(b => b.currentStatus === '즉시검사').length;
    document.getElementById('s-inprogress').textContent = bls.filter(b => b.currentStatus && b.currentStatus.includes('진행')).length;
    document.getElementById('s-done').textContent = bls.filter(b => b.currentStatus === '검사완료' || b.currentStatus === '비대상').length;
    document.getElementById('s-changed').textContent = bls.filter(b => b.hasChange).length;
  }

  function formatDate(d) {
    if (!d || d === '-') return '-';
    if (d.length === 8) return `${d.slice(4,6)}-${d.slice(6,8)}`;
    return d;
  }

  function formatTime(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function showLoading(msg) {
    document.getElementById('loading-msg').textContent = msg || '처리 중...';
    document.getElementById('loading-overlay').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('show');
  }
</script>
</body>
</html>
